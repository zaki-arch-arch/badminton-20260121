<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="./manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('./sw.js').then(function(registration) {
        console.log('ServiceWorkerの登録成功や！スコープ: ', registration.scope);

        // ★追加分：更新が見つかった時の処理
        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          newWorker.addEventListener('statechange', () => {
            // 新しいService Workerがインストール完了し、かつ既に古いものがコントロールしている場合
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner(registration);
            }
          });
        });
      }, function(err) {
        console.log('ServiceWorkerの登録失敗や…: ', err);
      });
    });

    // ★追加分：新しいService Workerがコントロールを奪った（activateされた）時にリロード
    let refreshing;
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  }

  // ★追加分：更新バナーを画面に出す関数
  function showUpdateBanner(registration) {
    // すでにバナーがあれば何もしない
    if (document.getElementById('pwa-update-banner')) return;

    const banner = document.createElement('div');
    banner.id = 'pwa-update-banner';
    // Tailwind CSSを使って君のアプリに合わせたデザインにする（下のナビバーに被らんように bottom-24 に設定）
    banner.className = 'fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-4 py-3 rounded-lg shadow-2xl z-50 flex items-center justify-between w-11/12 max-w-sm border border-gray-700';
    banner.innerHTML = `
      <div class="text-sm font-bold flex items-center gap-2">
        <i class="fas fa-arrow-alt-circle-up text-blue-400 text-lg"></i>
        新しいバージョンがあるで！
      </div>
      <button id="pwa-update-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded text-xs font-bold shadow transition-colors">
        更新する
      </button>
    `;
    document.body.appendChild(banner);

    document.getElementById('pwa-update-btn').addEventListener('click', () => {
      // 待機中の新しいService Workerに「すぐスキップして有効化せえ！」と命令
      if (registration.waiting) {
        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }
      // 連打防止
      document.getElementById('pwa-update-btn').textContent = '更新中...';
      document.getElementById('pwa-update-btn').disabled = true;
    });
  }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matcher Pro 2 - バドミントン対戦表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* ランクの色分け */
        .rank-1 { background-color: #fee2e2; color: #991b1b; } /* 強: 赤系 */
        .rank-2 { background-color: #fef3c7; color: #92400e; } /* 中: 黄系 */
        .rank-3 { background-color: #d1fae5; color: #065f46; } /* 弱: 緑系 */
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold"><i class="fas fa-shuttlecock mr-2"></i>Matcher Pro 2</h1>
        <div class="flex items-center gap-3">
            <span class="text-xs font-bold bg-white text-blue-600 px-2 py-1 rounded-full shadow-sm">参加: <span id="headerTotalCount">0</span>人</span>
            <button id="resetDataBtn" class="text-xs bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded shadow">初期化</button>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        
        <div id="tab-matching" class="tab-content active">
            <div class="bg-white rounded-lg shadow p-4 mb-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold border-b-2 border-blue-500 pb-1">試合生成</h2>
                    <div class="flex items-center space-x-2">
                        <label class="text-sm font-medium">使用コート数:</label>
                        <input type="number" id="courtCount" min="1" max="10" value="3" class="w-16 border rounded p-1 text-center font-bold text-blue-600">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">マッチングモード</label>
                    <div class="flex space-x-2">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="matchMode" value="balance" class="peer hidden" checked>
                            <div class="text-center py-2 border rounded-lg peer-checked:bg-blue-100 peer-checked:border-blue-500 peer-checked:font-bold text-sm">バランス（実力均等）</div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="matchMode" value="random" class="peer hidden">
                            <div class="text-center py-2 border rounded-lg peer-checked:bg-blue-100 peer-checked:border-blue-500 peer-checked:font-bold text-sm">完全ランダム</div>
                        </label>
                    </div>
                </div>

                <button id="generateMatchBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md flex justify-center items-center">
                    <i class="fas fa-play mr-2"></i>対戦表を生成する
                </button>
            </div>

            <div id="matchResults" class="space-y-4">
                <div class="text-center text-gray-500 py-8"><i class="fas fa-info-circle mr-1"></i>条件を設定して試合を生成してや</div>
            </div>

            <div class="mt-6 bg-white rounded-lg shadow p-4">
                <h3 class="font-bold text-gray-700 mb-2 border-b pb-1"><i class="fas fa-mug-hot mr-2"></i>今回のお休み（休憩）</h3>
                <div id="restingPlayers" class="flex flex-wrap gap-2 text-sm">
                    <span class="text-gray-400">試合生成後に表示されるで</span>
                </div>
            </div>
        </div>

        <div id="tab-players" class="tab-content">
            <div class="bg-white rounded-lg shadow p-4 mb-4">
                <h2 class="text-lg font-semibold border-b-2 border-green-500 pb-1 mb-3">新規登録</h2>
                <form id="addPlayerForm" class="flex gap-2">
                    <input type="text" id="newPlayerName" placeholder="名前" required class="flex-1 border rounded p-2 text-sm">
                    <select id="newPlayerGender" class="border rounded p-2 text-sm">
                        <option value="M">男</option>
                        <option value="F">女</option>
                    </select>
                    <select id="newPlayerRank" class="border rounded p-2 text-sm">
                        <option value="1">強</option>
                        <option value="2" selected>中</option>
                        <option value="3">弱</option>
                    </select>
                    <button type="submit" class="bg-green-600 text-white px-4 rounded font-bold"><i class="fas fa-plus"></i></button>
                </form>
            </div>

            <div class="flex justify-between items-center mb-2 bg-white p-2 rounded shadow text-sm">
                <span class="font-bold text-gray-600">レベル別（参加中）</span>
                <div class="flex gap-2 font-bold">
                    <span class="text-red-700 bg-red-100 px-2 py-0.5 rounded text-xs">R1: <span id="countR1">0</span></span>
                    <span class="text-yellow-700 bg-yellow-100 px-2 py-0.5 rounded text-xs">R2: <span id="countR2">0</span></span>
                    <span class="text-green-700 bg-green-100 px-2 py-0.5 rounded text-xs">R3: <span id="countR3">0</span></span>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow overflow-hidden">
                <ul id="playerList" class="divide-y divide-gray-200"></ul>
            </div>
            
            <div class="mt-2 flex justify-end">
                <button onclick="deleteAllPlayers()" class="text-xs bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 px-3 py-2 rounded flex items-center shadow-sm transition-colors">
                    <i class="fas fa-trash-alt mr-1"></i>全選手を一括削除
                </button>
            </div>

            <div class="bg-white rounded-lg shadow p-4 mt-4 mb-4">
                <h2 class="text-lg font-semibold border-b-2 border-gray-500 pb-1 mb-3">データバックアップ・復元</h2>
                <div class="flex flex-col gap-2">
                    <button onclick="exportData()" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded text-sm font-bold shadow"><i class="fas fa-copy mr-2"></i>現在のデータをコピー</button>
                    <textarea id="importDataText" rows="2" placeholder="ここにコピーしたデータを貼り付け" class="border rounded p-2 text-xs w-full mt-2"></textarea>
                    <button onclick="importData()" class="bg-yellow-600 hover:bg-yellow-700 text-white px-4 py-2 rounded text-sm font-bold shadow"><i class="fas fa-file-import mr-2"></i>データを復元（上書き）</button>
                </div>
            </div>
        </div>

        <div id="tab-stats" class="tab-content">
            <div class="bg-white rounded-lg shadow p-4">
                <h2 class="text-lg font-semibold border-b-2 border-purple-500 pb-1 mb-3">成績・出場状況</h2>
                <p class="text-xs text-gray-500 mb-4">出場回数が均等になるようシステムが自動調整してるで。<br><span class="text-blue-600 font-bold">※参加人数が多い場合、2連続での「出番」や「休み」は許容しつつ、3連続は絶対に防ぐロジックで動いてるで。</span></p>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-2 py-2 text-left text-gray-600">名前</th>
                                <th class="px-2 py-2 text-center text-gray-600">勝</th>
                                <th class="px-2 py-2 text-center text-gray-600">出場</th>
                                <th class="px-2 py-2 text-center text-gray-600" title="連続出場">連出</th>
                                <th class="px-2 py-2 text-center text-gray-600" title="連続休み">連休</th>
                                <th class="px-2 py-2 text-center text-gray-600">休</th>

                        </thead>
                        <tbody id="statsList" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around pb-safe">
        <button onclick="switchTab('matching')" id="nav-matching" class="nav-btn flex-1 py-3 text-center text-blue-600 flex flex-col items-center">
            <i class="fas fa-random text-xl mb-1"></i><span class="text-xs font-bold">マッチング</span>
        </button>
        <button onclick="switchTab('players')" id="nav-players" class="nav-btn flex-1 py-3 text-center text-gray-400 hover:text-green-600 flex flex-col items-center">
            <i class="fas fa-users text-xl mb-1"></i><span class="text-xs font-bold">選手</span>
        </button>
        <button onclick="switchTab('stats')" id="nav-stats" class="nav-btn flex-1 py-3 text-center text-gray-400 hover:text-purple-600 flex flex-col items-center">
            <i class="fas fa-trophy text-xl mb-1"></i><span class="text-xs font-bold">成績</span>
        </button>
    </nav>

    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50"></div>
    <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 w-11/12 max-w-sm shadow-xl">
            <h3 class="text-lg font-bold mb-4" id="modalTitle">確認</h3>
            <p class="text-sm text-gray-600 mb-6" id="modalMessage">ホンマに実行するんか？</p>
            <div class="flex justify-end gap-3">
                <button id="modalCancelBtn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded font-bold hover:bg-gray-300">キャンセル</button>
                <button id="modalOkBtn" class="px-4 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700">実行する</button>
            </div>
        </div>
    </div>

    <script>
        // --- 状態管理 ---
        let state = {
            players: [], courtCount: 3, pairHistory: {}, oppHistory: {}, lastMatches: [],
            coPlayHistory: {} 
        };

        // --- 初期化・データロード ---
        function loadData() {
            try {
                const saved = localStorage.getItem('matcherProState');
                if (saved) {
                    state = JSON.parse(saved);
                    state.pairHistory = state.pairHistory || {};
                    state.oppHistory = state.oppHistory || {};
                    state.lastMatches = state.lastMatches || [];
                    state.coPlayHistory = state.coPlayHistory || {};

                    state.players.forEach(p => {
                        p.matchCount = p.matchCount || 0;
                        p.restCount = p.restCount || 0;
                        p.manualRestCount = p.manualRestCount || 0; 
                        p.winCount = p.winCount || 0;
                        p.consecutiveMatches = p.consecutiveMatches || 0;
                        p.continuousRest = p.continuousRest || 0; 
                        p.status = p.status || 'active'; 
                        p.wasResting = p.wasResting || false; 
                        p.justReturned = p.justReturned || false; 
                    });
                }
            } catch(e) {
                console.warn('プレビュー環境やからlocalStorageは使えへんで。データは一時的に保存されるわ。');
            }
            document.getElementById('courtCount').value = state.courtCount || 3;
            renderAll();
        }

        function saveData() { 
            try {
                localStorage.setItem('matcherProState', JSON.stringify(state)); 
            } catch(e) {
                console.warn('プレビュー環境やからセーブできへんで。');
            }
        }

        // --- UI更新 ---
        function renderAll() {
            renderPlayers(); renderStats();
            const activePlayers = state.players.filter(p => p.status !== 'inactive');
            document.getElementById('headerTotalCount').textContent = activePlayers.length;
            document.getElementById('countR1').textContent = activePlayers.filter(p => p.rank === 1).length;
            document.getElementById('countR2').textContent = activePlayers.filter(p => p.rank === 2).length;
            document.getElementById('countR3').textContent = activePlayers.filter(p => p.rank === 3).length;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('text-blue-600', 'text-green-600', 'text-purple-600');
                el.classList.add('text-gray-400');
            });
            const colorClass = tabId === 'matching' ? 'text-blue-600' : tabId === 'players' ? 'text-green-600' : 'text-purple-600';
            document.getElementById(`nav-${tabId}`).classList.remove('text-gray-400');
            document.getElementById(`nav-${tabId}`).classList.add(colorClass);
            if(tabId === 'stats') renderStats();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 2500);
        }

        let modalCallback = null;
        function showConfirm(title, message, callback, okText = "リセットする", okColorClass = "bg-red-600") {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            const okBtn = document.getElementById('modalOkBtn');
            okBtn.textContent = okText;
            okBtn.className = `px-4 py-2 text-white rounded font-bold ${okColorClass} hover:opacity-80`;
            modalCallback = callback;
            document.getElementById('confirmModal').classList.remove('hidden');
        }

        document.getElementById('modalCancelBtn').addEventListener('click', () => { document.getElementById('confirmModal').classList.add('hidden'); modalCallback = null; });
        document.getElementById('modalOkBtn').addEventListener('click', () => { document.getElementById('confirmModal').classList.add('hidden'); if (modalCallback) modalCallback(); });

        // --- 選手管理処理 ---
        document.getElementById('addPlayerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('newPlayerName').value;
            state.players.push({
                id: 'p' + Date.now(), name, gender: document.getElementById('newPlayerGender').value, 
                rank: parseInt(document.getElementById('newPlayerRank').value), status: 'active',
                matchCount: 0, restCount: 0, manualRestCount: 0, winCount: 0, 
                consecutiveMatches: 0, continuousRest: 0, wasResting: false, justReturned: false
            });
            document.getElementById('newPlayerName').value = '';
            saveData(); renderAll(); showToast(`${name}を追加したで！`);
        });

        function changePlayerStatus(id, newStatus) {
            const player = state.players.find(p => p.id === id);
            if(player) { 
                const oldStatus = player.status;
                player.status = newStatus; 
                
                if ((oldStatus === 'inactive' || oldStatus === 'skip1') && newStatus === 'active') {
                    const activeOthers = state.players.filter(p => p.status === 'active' && p.id !== id);
                    if (activeOthers.length > 0) {
                        const minMatch = Math.min(...activeOthers.map(p => p.matchCount));
                        player.matchCount = minMatch;
                    }
                    
                    player.continuousRest = 0;
                    player.consecutiveMatches = 0;
                    player.justReturned = true;
                    showToast(`${player.name} を復帰させたで！次回は確実に出るわ！`);
                }
                
                saveData(); 
                renderAll(); 
            }
        }

        function changePlayerRank(id, newRank) {
            const player = state.players.find(p => p.id === id);
            if(player) { player.rank = parseInt(newRank); saveData(); renderAll(); showToast('ランク変更したで'); }
        }
        
        window.deletePlayer = function(id, name) {
            showConfirm('選手削除', `${name} を削除するで？`, () => {
                state.players = state.players.filter(p => p.id !== id);
                saveData(); renderAll(); showToast(`${name} を削除したで`);
            }, "削除する", "bg-red-600");
        };

        window.deleteAllPlayers = function() {
            if (state.players.length === 0) {
                showToast('削除する選手がおらへんで！');
                return;
            }
            showConfirm(
                '全選手一括削除（危険）',
                '登録されてる全選手と、これまでの対戦履歴・成績を全部スッキリ消し飛ばすで？ホンマにええか？（復元できへんで！）',
                () => {
                    state.players = []; state.pairHistory = {}; state.oppHistory = {}; 
                    state.lastMatches = []; state.coPlayHistory = {}; saveData(); renderAll(); 
                    document.getElementById('matchResults').innerHTML = '<div class="text-center text-gray-500 py-8"><i class="fas fa-info-circle mr-1"></i>条件を設定して試合を生成してや</div>';
                    document.getElementById('restingPlayers').innerHTML = '<span class="text-gray-400">試合生成後に表示されるで</span>';
                    showToast('全選手を削除して更地にしたで！');
                },
                "全部消す", "bg-red-700"
            );
        };

        function renderPlayers() {
            const list = document.getElementById('playerList');
            list.innerHTML = '';
            const sorted = [...state.players].sort((a, b) => {
                if(a.status === 'inactive' && b.status !== 'inactive') return 1;
                if(a.status !== 'inactive' && b.status === 'inactive') return -1;
                return a.name.localeCompare(b.name, 'ja');
            });
            sorted.forEach(p => {
                const li = document.createElement('li');
                li.className = `p-3 flex items-center justify-between ${p.status === 'inactive' ? 'bg-gray-100 opacity-60' : ''}`;
                li.innerHTML = `
                    <div class="flex items-center">
                        <i class="fas fa-user ${p.gender === 'M' ? 'text-blue-500' : 'text-pink-500'} w-5 text-center mr-2"></i>
                        <span class="font-bold text-gray-800">${p.name}</span>
                        <select onchange="changePlayerRank('${p.id}', this.value)" class="ml-2 text-xs px-2 py-0.5 rounded-full rank-${p.rank} appearance-none cursor-pointer text-center outline-none border border-transparent shadow-sm">
                            <option value="1" class="bg-white text-gray-800" ${p.rank === 1 ? 'selected' : ''}>R1(強)</option>
                            <option value="2" class="bg-white text-gray-800" ${p.rank === 2 ? 'selected' : ''}>R2(中)</option>
                            <option value="3" class="bg-white text-gray-800" ${p.rank === 3 ? 'selected' : ''}>R3(弱)</option>
                        </select>
                        ${p.status === 'skip1' ? `<span class="ml-2 text-xs bg-yellow-400 text-yellow-900 px-1 rounded">1回休</span>` : ''}
                    </div>
                    <div class="flex space-x-2 items-center">
                        <select onchange="changePlayerStatus('${p.id}', this.value)" class="text-xs border rounded p-1 bg-white">
                            <option value="active" ${p.status === 'active' ? 'selected' : ''}>参加</option>
                            <option value="skip1" ${p.status === 'skip1' ? 'selected' : ''}>1回休</option>
                            <option value="inactive" ${p.status === 'inactive' ? 'selected' : ''}>休止</option>
                        </select>
                        <button onclick="deletePlayer('${p.id}', '${p.name}')" class="text-red-400 hover:text-red-600 p-1"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        const getPairKey = (p1, p2) => [p1.id, p2.id].sort().join('_');

        // --- ペアリングコスト評価関数 ---
        const evaluateCourtCost = (courtGrp, mode) => {
            const patterns = [
                { t1: [courtGrp[0], courtGrp[1]], t2: [courtGrp[2], courtGrp[3]] },
                { t1: [courtGrp[0], courtGrp[2]], t2: [courtGrp[1], courtGrp[3]] },
                { t1: [courtGrp[0], courtGrp[3]], t2: [courtGrp[1], courtGrp[2]] }
            ];
            let bestPattern = null;
            let minCost = Infinity;

            patterns.forEach(pat => {
                let cost = 0;
                const pair1Key = getPairKey(pat.t1[0], pat.t1[1]);
                const pair2Key = getPairKey(pat.t2[0], pat.t2[1]);

                if ((state.pairHistory[pair1Key] || 0) >= 1) cost += 50000000;
                if ((state.pairHistory[pair2Key] || 0) >= 1) cost += 50000000;

                const wasTeam1LastMatch = state.lastMatches.some(m => getPairKey(m.team1[0], m.team1[1]) === pair1Key || getPairKey(m.team2[0], m.team2[1]) === pair1Key);
                const wasTeam2LastMatch = state.lastMatches.some(m => getPairKey(m.team1[0], m.team1[1]) === pair2Key || getPairKey(m.team2[0], m.team2[1]) === pair2Key);
                if (wasTeam1LastMatch) cost += 500000; 
                if (wasTeam2LastMatch) cost += 500000;

                const oppPairs = [
                    getPairKey(pat.t1[0], pat.t2[0]), getPairKey(pat.t1[0], pat.t2[1]),
                    getPairKey(pat.t1[1], pat.t2[0]), getPairKey(pat.t1[1], pat.t2[1])
                ];
                oppPairs.forEach(key => { 
                    cost += Math.pow((state.oppHistory[key] || 0), 2) * 1000;
                });

                if (mode === 'balance') {
                    const diff = Math.abs((pat.t1[0].rank + pat.t1[1].rank) - (pat.t2[0].rank + pat.t2[1].rank));
                    cost += diff * 1000;
                }

                cost += Math.random() * 50; 

                if (cost < minCost) {
                    minCost = cost;
                    bestPattern = { ...pat, cost: minCost };
                }
            });
            return bestPattern;
        };

        // --- マッチング生成コアロジック ---
        document.getElementById('courtCount').addEventListener('change', (e) => {
            state.courtCount = parseInt(e.target.value) || 1; saveData();
        });

        document.getElementById('generateMatchBtn').addEventListener('click', () => {
            const mode = document.querySelector('input[name="matchMode"]:checked').value;
            const requiredPlayers = state.courtCount * 4;
            
            let candidates = state.players.filter(p => p.status === 'active');
            let skip1Players = state.players.filter(p => p.status === 'skip1');
            const inactivePlayers = state.players.filter(p => p.status === 'inactive');
            const originalSkip1 = [...skip1Players];
            
            if(candidates.length < 4) {
                showToast('参加可能人数が少なすぎるで！（最低4人必要）。'); return;
            }

            const maxMatchCount = candidates.length > 0 ? Math.max(...candidates.map(p => p.matchCount)) : 0;
            const minMatchCount = candidates.length > 0 ? Math.min(...candidates.map(p => p.matchCount)) : 0;

            let bestOverallMatches = [];
            let bestSelectedPlayers = [];
            let bestRestingPlayers = [];
            let minOverallCost = Infinity;

            for (let iter = 0; iter < 3000; iter++) {
                
                let shuffled = [...candidates].sort((a, b) => {
                    if (a.justReturned && !b.justReturned) return -1;
                    if (!a.justReturned && b.justReturned) return 1;

                    if (a.continuousRest >= 2 && b.continuousRest < 2) return -1;
                    if (a.continuousRest < 2 && b.continuousRest >= 2) return 1;

                    if (a.consecutiveMatches >= 2 && b.consecutiveMatches < 2) return 1;
                    if (a.consecutiveMatches < 2 && b.consecutiveMatches >= 2) return -1;

                    if (a.matchCount !== b.matchCount) {
                        return a.matchCount - b.matchCount;
                    }

                    return Math.random() - 0.5;
                });
                
                let currentSelected = shuffled.slice(0, requiredPlayers);
                let currentResting = shuffled.slice(requiredPlayers);
                
                const validCount = Math.floor(currentSelected.length / 4) * 4;
                const overflow = currentSelected.slice(validCount);
                currentSelected = currentSelected.slice(0, validCount);
                currentResting = currentResting.concat(overflow);

                let selectionCost = 0;
                
                currentResting.forEach(p => {
                    if (p.justReturned) {
                        selectionCost += 10000000; 
                    }

                    let debt = maxMatchCount - p.matchCount; 
                    
                    if (debt === 1) selectionCost += 10; 
                    if (debt === 2) selectionCost += 100; 
                    if (debt >= 3) selectionCost += 500000; 
                    
                    if (p.continuousRest === 1) selectionCost += 10; 
                    if (p.continuousRest >= 2) selectionCost += 50000000; 
                });
                
                currentSelected.forEach(p => {
                    let overPlay = p.matchCount - minMatchCount; 
                    
                    if (overPlay === 1) selectionCost += 10; 
                    if (overPlay === 2) selectionCost += 100;
                    if (overPlay >= 3) selectionCost += 500000;

                    if (p.consecutiveMatches === 1) selectionCost += 10; 
                    if (p.consecutiveMatches >= 2) selectionCost += 50000000; 
                });
                
                let currentMatches = [];
                let pairingCost = 0;
                let coPlayCost = 0; 
                
                for (let i = 0; i < currentSelected.length; i += 4) {
                    const courtGrp = currentSelected.slice(i, i + 4);
                    
                    for(let x = 0; x < courtGrp.length; x++) {
                        for(let y = x + 1; y < courtGrp.length; y++) {
                            const key = getPairKey(courtGrp[x], courtGrp[y]);
                            coPlayCost += Math.pow((state.coPlayHistory[key] || 0), 2) * 1500;
                        }
                    }

                    const bestCourtPat = evaluateCourtCost(courtGrp, mode);
                    if (bestCourtPat) {
                        currentMatches.push({
                            team1: bestCourtPat.t1, team2: bestCourtPat.t2, status: 'playing'
                        });
                        pairingCost += bestCourtPat.cost;
                    }
                }
                
                const totalCost = selectionCost + pairingCost + coPlayCost;
                
                if (totalCost < minOverallCost) {
                    minOverallCost = totalCost;
                    bestOverallMatches = currentMatches;
                    bestSelectedPlayers = currentSelected;
                    bestRestingPlayers = currentResting;
                }
            }

            const matches = bestOverallMatches;

            // --- 状態の更新処理 ---
            bestSelectedPlayers.forEach(p => {
                const player = state.players.find(x => x.id === p.id);
                player.matchCount++;
                player.consecutiveMatches++; 
                player.continuousRest = 0;   
                player.wasResting = false;
                player.justReturned = false; 
            });

            const autoRests = bestRestingPlayers; 
            autoRests.forEach(p => {
                const player = state.players.find(x => x.id === p.id);
                player.restCount++; 
                player.consecutiveMatches = 0; 
                player.continuousRest++;       
                player.wasResting = true; 
            });

            originalSkip1.forEach(p => {
                const player = state.players.find(x => x.id === p.id);
                player.manualRestCount++; 
                player.consecutiveMatches = 0;
                player.continuousRest++; 
                player.status = 'active'; 
            });

            inactivePlayers.forEach(p => {
                const player = state.players.find(x => x.id === p.id);
                player.manualRestCount++; 
                player.consecutiveMatches = 0;
            });

            state.lastMatches = matches.map(m => ({
                team1: [{id: m.team1[0].id}, {id: m.team1[1].id}],
                team2: [{id: m.team2[0].id}, {id: m.team2[1].id}]
            }));

            matches.forEach(m => {
                const pair1 = getPairKey(m.team1[0], m.team1[1]);
                const pair2 = getPairKey(m.team2[0], m.team2[1]);
                state.pairHistory[pair1] = (state.pairHistory[pair1] || 0) + 1;
                state.pairHistory[pair2] = (state.pairHistory[pair2] || 0) + 1;

                const opps = [
                    getPairKey(m.team1[0], m.team2[0]), getPairKey(m.team1[0], m.team2[1]),
                    getPairKey(m.team1[1], m.team2[0]), getPairKey(m.team1[1], m.team2[1])
                ];
                opps.forEach(key => { state.oppHistory[key] = (state.oppHistory[key] || 0) + 1; });

                const pAll = [...m.team1, ...m.team2];
                for(let i = 0; i < pAll.length; i++) {
                    for(let j = i + 1; j < pAll.length; j++) {
                        const key = getPairKey(pAll[i], pAll[j]);
                        state.coPlayHistory[key] = (state.coPlayHistory[key] || 0) + 1;
                    }
                }
            });

            saveData();
            renderMatches(matches, bestRestingPlayers, originalSkip1, inactivePlayers);
            showToast('神アサインが完成したで！');
        });

        function renderMatches(matches, restingPlayers, skip1Players = [], inactivePlayers = []) {
            const container = document.getElementById('matchResults');
            container.innerHTML = '';
            matches.forEach((m, index) => {
                const div = document.createElement('div');
                div.className = 'bg-white rounded-lg shadow border-l-4 border-blue-500 overflow-hidden';
                const t1P1Color = m.team1[0].gender === 'M' ? 'text-blue-600' : 'text-pink-600';
                const t1P2Color = m.team1[1].gender === 'M' ? 'text-blue-600' : 'text-pink-600';
                const t2P1Color = m.team2[0].gender === 'M' ? 'text-blue-600' : 'text-pink-600';
                const t2P2Color = m.team2[1].gender === 'M' ? 'text-blue-600' : 'text-pink-600';

                div.innerHTML = `
                    <div class="bg-gray-50 p-2 flex justify-between items-center border-b">
                        <span class="font-bold text-gray-700">第 ${index + 1} コート</span>
                        <div class="flex gap-2">
                            <button class="win-btn text-xs bg-gray-200 hover:bg-green-500 hover:text-white px-3 py-1 rounded" onclick="recordWin(this, '${m.team1[0].id}','${m.team1[1].id}')">左WIN</button>
                            <button class="win-btn text-xs bg-gray-200 hover:bg-green-500 hover:text-white px-3 py-1 rounded" onclick="recordWin(this, '${m.team2[0].id}','${m.team2[1].id}')">右WIN</button>
                        </div>
                    </div>
                    <div class="p-4 flex justify-between items-center text-center">
                        <div class="flex-1"><div class="font-bold ${t1P1Color}">${m.team1[0].name}</div><div class="font-bold ${t1P2Color}">${m.team1[1].name}</div></div>
                        <div class="px-2 text-red-500 font-bold italic">VS</div>
                        <div class="flex-1"><div class="font-bold ${t2P1Color}">${m.team2[0].name}</div><div class="font-bold ${t2P2Color}">${m.team2[1].name}</div></div>
                    </div>
                `;
                container.appendChild(div);
            });

            const restContainer = document.getElementById('restingPlayers');
            restContainer.innerHTML = '';
            const allRests = [
                ...restingPlayers.map(p => ({ ...p, badge: '', badgeClass: '' })),
                ...skip1Players.map(p => ({ ...p, badge: '1回休', badgeClass: 'bg-yellow-400 text-yellow-900' })),
                ...inactivePlayers.map(p => ({ ...p, badge: '休止', badgeClass: 'bg-gray-500 text-white' }))
            ];
            if(allRests.length === 0) {
                restContainer.innerHTML = '<span class="text-gray-400">お休みなし</span>';
            } else {
                allRests.forEach(p => {
                    const span = document.createElement('span');
                    span.className = 'bg-gray-200 text-gray-700 px-2 py-1 rounded shadow-sm flex items-center text-sm';
                    span.innerHTML = `${p.name} ${p.badge ? `<span class="ml-1 px-1 rounded text-[10px] font-bold ${p.badgeClass}">${p.badge}</span>` : ''}`;
                    restContainer.appendChild(span);
                });
            }
        }

        window.recordWin = function(btn, p1Id, p2Id) {
            const p1 = state.players.find(p => p.id === p1Id);
            const p2 = state.players.find(p => p.id === p2Id);
            if(p1) p1.winCount++; if(p2) p2.winCount++; saveData();
            
            const card = btn.closest('.bg-white');
            card.classList.remove('border-blue-500'); card.classList.add('border-green-500', 'opacity-70');
            card.querySelector('.bg-gray-50').classList.add('bg-green-50');
            card.querySelectorAll('.win-btn').forEach(b => { b.disabled = true; b.classList.add('cursor-not-allowed', 'opacity-50'); });
            btn.textContent = '記録済'; btn.classList.replace('bg-gray-200', 'bg-green-600'); btn.classList.add('text-white');
        };

        function renderStats() {
            const list = document.getElementById('statsList');
            list.innerHTML = '';
            const sorted = [...state.players].filter(p => p.status !== 'inactive').sort((a, b) => {
                if(b.winCount !== a.winCount) return b.winCount - a.winCount;
                return a.matchCount - b.matchCount;
            });
            sorted.forEach(p => {
                const tr = document.createElement('tr');
                const conColor = p.consecutiveMatches >= 3 ? 'text-red-500 font-bold' : 'text-gray-600';
                const restColor = p.continuousRest >= 2 ? 'text-red-500 font-bold' : 'text-gray-600';
                tr.innerHTML = `
                    <td class="px-2 py-2 whitespace-nowrap text-gray-800 font-medium">${p.name}</td>
                    <td class="px-2 py-2 whitespace-nowrap text-center font-bold text-red-600">${p.winCount}</td>
                    <td class="px-2 py-2 whitespace-nowrap text-center text-blue-600 font-bold">${p.matchCount}</td>
                    <td class="px-2 py-2 whitespace-nowrap text-center ${conColor}">${p.consecutiveMatches}</td>
                    <td class="px-2 py-2 whitespace-nowrap text-center ${restColor}">${p.continuousRest}</td>
                    <td class="px-2 py-2 whitespace-nowrap text-center text-gray-500">${p.restCount}</td>
                `;
                list.appendChild(tr);
            });
        }

        document.getElementById('resetDataBtn').addEventListener('click', () => {
            showConfirm('データ初期化', 'データ全部リセットするで？', () => {
                state.players.forEach(p => {
                    p.matchCount = 0; p.restCount = 0; p.manualRestCount = 0; p.winCount = 0;
                    p.consecutiveMatches = 0; p.continuousRest = 0; p.wasResting = false; p.justReturned = false;
                    if(p.status === 'skip1') p.status = 'active';
                });
                state.pairHistory = {}; state.oppHistory = {}; state.lastMatches = []; state.coPlayHistory = {}; saveData();
                document.getElementById('matchResults').innerHTML = '<div class="text-center text-gray-500 py-8">試合を生成してや</div>';
                document.getElementById('restingPlayers').innerHTML = '<span class="text-gray-400">試合生成後に表示されるで</span>';
                renderAll(); showToast('リセット完了や！');
            });
        });

        window.exportData = function() {
            const exportText = `【MatcherPro バックアップ】\n${JSON.stringify(state)}`;
            const textArea = document.createElement("textarea");
            textArea.value = exportText; textArea.style.position = "absolute"; textArea.style.left = "-9999px";
            document.body.appendChild(textArea); textArea.select();
            try { document.execCommand('copy'); showToast('コピーしたで！'); } catch (ex) { showToast('失敗や'); }
            document.body.removeChild(textArea);
        };

        window.importData = function() {
            const text = document.getElementById('importDataText').value.trim();
            if(!text) return showToast('データ貼り付けてや！');
            try {
                const firstBrace = text.indexOf('{'); const lastBrace = text.lastIndexOf('}');
                if (firstBrace === -1 || lastBrace === -1) return showToast('無効なデータや');
                let jsonString = text.substring(firstBrace, lastBrace + 1).replace(/[“”]/g, '"').replace(/[‘’]/g, "'").replace(/　/g, ' ');
                const parsed = JSON.parse(jsonString);
                if(parsed && parsed.players) {
                    showConfirm('データ復元', '上書きするで？', () => {
                        state = parsed;
                        state.pairHistory = state.pairHistory || {}; state.oppHistory = state.oppHistory || {}; state.lastMatches = state.lastMatches || []; state.coPlayHistory = state.coPlayHistory || {};
                        state.players.forEach(p => {
                            p.matchCount = p.matchCount || 0; p.restCount = p.restCount || 0; p.manualRestCount = p.manualRestCount || 0; 
                            p.winCount = p.winCount || 0; p.consecutiveMatches = p.consecutiveMatches || 0; p.continuousRest = p.continuousRest || 0;
                            p.status = p.status || 'active'; p.wasResting = p.wasResting || false; p.justReturned = p.justReturned || false;
                        });
                        saveData(); renderAll(); document.getElementById('importDataText').value = ''; showToast('復元したで！');
                    }, "上書きする", "bg-yellow-600");
                }
            } catch(e) { showToast('読み込みエラーや'); }
        };

        loadData();
    </script>
</body>
